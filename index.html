  <script>
    var text;
    document.addEventListener('DOMContentLoaded', function () {
      var bgmusic = document.getElementById('bgmusic');
      if (bgmusic) {
        bgmusic.muted = true;
        bgmusic.play().catch(function (error) {
          console.warn('Autoplay blocked (muted attempt):', error);
        });
      }
      const excerpt = document.querySelector('.excerpt');
      text = excerpt.innerHTML;
      excerpt.innerHTML = '';
      let progress = 0;
      const progressBar = document.querySelector('.progress-bar');
      const progressText = document.querySelector('.progress-text');
      const enterText = document.querySelector('.enter-text');
      function animateProgress() {
        if (progress < 100) {
          progress++;
          const offset = 314 - (314 * progress / 100);
          progressBar.style.strokeDashoffset = offset;
          progressText.textContent = progress + '%';
          setTimeout(animateProgress, 10);
        } else {
          document.querySelector('.progress-circle').style.display = 'none';
          enterText.style.display = 'block';
          document.getElementById('intro').addEventListener('click', enterWeb);
        }
      }
      const viewCount = document.querySelector('.view-count');
      if (viewCount) {
        const randomIncrease = Math.floor(Math.random() * 3) + 1;
        viewCount.textContent = (9473 + randomIncrease).toString();
      }
      animateProgress();
    });

    function typeWriter() {
      const excerpt = document.querySelector('.excerpt');
      if (!excerpt.dataset.index) {
        excerpt.dataset.index = '0';
      }
      let index = parseInt(excerpt.dataset.index);
      if (index < text.length) {
        excerpt.innerHTML = text.substring(0, index + 1) + '<span class="cursor">|</span>';
        index++;
        excerpt.dataset.index = index.toString();
        setTimeout(typeWriter, 80);
      } else {
        excerpt.innerHTML = text + '<span class="cursor">|</span>';
      }
    }

    function enterWeb() {
      var intro = document.getElementById('intro');
      intro.style.opacity = '0';
      setTimeout(function() {
        intro.style.display = 'none';
        var main = document.getElementById('main');
        main.style.display = 'block';
        main.style.opacity = '0';
        setTimeout(function() {
          main.style.opacity = '1';
          var bgmusic = document.getElementById('bgmusic');
          if (bgmusic) {
            bgmusic.muted = false;
            bgmusic.play().catch(function (error) {
              console.warn('Play after enterWeb blocked:', error);
            });
          }
          typeWriter();
        }, 10);
      }, 1000);
    }

    function unlockAudio() {
      var bgmusic = document.getElementById('bgmusic');
      if (bgmusic) {
        bgmusic.muted = false;
        bgmusic.play().catch(function (error) {
          console.warn('unlockAudio play blocked:', error);
        });
      }
      document.removeEventListener('click', unlockAudio);
      document.removeEventListener('touchstart', unlockAudio);
      document.removeEventListener('keydown', unlockAudio);
    }

    document.addEventListener('click', unlockAudio, { once: true });
    document.addEventListener('touchstart', unlockAudio, { once: true });
    document.addEventListener('keydown', unlockAudio, { once: true });
    document.addEventListener('keydown', enterWeb);

    function copyDiscord(event) {
      event.preventDefault();
      navigator.clipboard.writeText('_duy.hung').then(() => {
        showNotification('Discord username copied!');
      });
    }

    function showNotification(msg) {
      const notif = document.getElementById('notification');
      notif.textContent = msg;
      notif.style.display = 'block';
      notif.style.opacity = '1';
      setTimeout(() => {
        notif.style.opacity = '0';
        setTimeout(() => notif.style.display = 'none', 300);
      }, 2000);
    }
  </script>
